# LegisNote — single-VPS deployment (D6 Postgres = source of truth; self-hosted).
# v1 services: postgres, minio, caddy, web. The ingestion tool runs on demand
# (tools/ingestion) and is not a long-running service. meilisearch is v2.
#
# Copy infra/.env.example -> infra/.env and fill secrets before `docker compose up`.

name: legisnote

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legisnote}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in infra/.env}
      POSTGRES_DB: ${POSTGRES_DB:-legisnote}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      # Runs ONCE on an empty data dir to create the schema.
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legisnote} -d ${POSTGRES_DB:-legisnote}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-legisnote}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set in infra/.env}
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # console (admin only)
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-legisnote}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-legisnote}
      AUTH_SECRET: ${AUTH_SECRET:?set in infra/.env}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-legisnote}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    expose:
      - "3000"
    # Uncomment when apps/web/Dockerfile is in place:
    profiles: ["full"]

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data
      - ./data/caddy-config:/config
    profiles: ["full"]

  # v2 — full-text search read path (Meilisearch). Disabled by default.
  meilisearch:
    image: getmeili/meilisearch:v1.10
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-}
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - ./data/meili:/meili_data
    profiles: ["v2"]
