# LegisNote — ZERO-CONFIG LOCAL stack (for trying it out on your machine).
#
#   docker compose -f infra/docker-compose.local.yml up -d --build --wait
#   → app at http://localhost:3000
#
# Or just run infra/local-up.sh, which also applies the DB migration and seeds an
# admin user. This file is intentionally self-contained: every value has a safe
# dev default, so NO .env file is required. It runs only Postgres + the web app
# (no Caddy/TLS, no MinIO/Meili) and binds to 127.0.0.1 only.
#
# DO NOT use these defaults in production — deploy with docker-compose.yml +
# infra/.env (real secrets, Caddy TLS). See docs/deployment.md.

name: legisnote-local

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legisnote}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      POSTGRES_DB: ${POSTGRES_DB:-legisnote}
    # No host port: the web container reaches Postgres over the Compose network, so
    # we don't bind 5432 on the host (avoids clashes with another local Postgres /
    # the prod stack). Need psql? `docker compose -f docker-compose.local.yml exec postgres psql -U legisnote -d legisnote`
    volumes:
      # Separate from the prod ./data/postgres dir so the two never collide.
      - ./data/postgres-local:/var/lib/postgresql/data
      # Applied once on an empty data dir; already includes the FR-16/17 status column.
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legisnote} -d ${POSTGRES_DB:-legisnote}"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-legisnote}:${POSTGRES_PASSWORD:-localdev}@postgres:5432/${POSTGRES_DB:-legisnote}
      # Dev-only defaults — fine for localhost, NEVER for a real deployment.
      AUTH_SECRET: ${AUTH_SECRET:-dev-only-auth-secret-not-for-production}
      IMPORTER_TOKEN: ${IMPORTER_TOKEN:-dev-importer-token}
      # NextAuth v5 trusts the Host header when there's no reverse proxy / AUTH_URL.
      AUTH_TRUST_HOST: "true"
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
